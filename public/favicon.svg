<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Outer Glow Ring -->
  <circle cx="16" cy="16" r="14" fill="#020617" stroke="url(#emeraldGradient)" stroke-width="2" />
  
  <!-- Robot/Bot Face Details -->
  <path d="M10 11a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v6a3 3 0 0 1-3 3h-4a3 3 0 0 1-3-3v-6Z" fill="#0f172a" stroke="url(#tealGradient)" stroke-width="1.5" />
  
  <!-- Antenna element -->
  <path d="M16 10V7" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" />
  <circle cx="16" cy="6" r="1.5" fill="#14b8a6" />

  <!-- Digital Eyes -->
  <rect x="12" y="13" width="2" height="2" rx="1.0" fill="#34d399" />
  <rect x="18" y="13" width="2" height="2" rx="1.0" fill="#34d399" />

  <!-- Dynamic Trading Trend line through the brain -->
  <path d="M7 23l6-4 4 4 8-6" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  <polygon points="25,17 25,21 21,17" fill="#10b981" />

  <!-- Gradients definitions -->
  <defs>
    <linearGradient id="emeraldGradient" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="50%" stop-color="#14b8a6" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="tealGradient" x1="10" y1="10" x2="22" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#0d9488" />
    </linearGradient>
  </defs>
</svg>
